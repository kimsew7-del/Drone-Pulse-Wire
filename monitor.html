<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Briefwave — Report Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark">BW</div>
          <div>
            <p class="eyebrow">Institutional Report Monitor</p>
            <h1>기관 리포트</h1>
          </div>
        </div>
        <div class="topbar-right">
          <a class="nav-pill" href="./index.html" style="background:rgba(255,107,44,0.12);color:var(--accent)">
            <strong>피드</strong>
          </a>
          <a class="live-pill live-link" href="./health_monitor.html">
            <strong>HEALTH</strong>
          </a>
        </div>
      </header>

      <main class="report-monitor-layout">
        <!-- 좌측: 통계 + 수집 제어 -->
        <aside class="rm-sidebar">
          <section class="panel rm-stats-panel">
            <div class="panel-head">
              <h2>리포트 현황</h2>
            </div>
            <div id="rm-metrics" class="trend-metrics"></div>
            <div id="rm-region-breakdown" class="rm-region-breakdown"></div>
          </section>

          <section class="panel crawl-control-panel">
            <div class="panel-head">
              <h2>수집 제어</h2>
            </div>

            <div class="rm-section">
              <label for="rm-topic">주제 수집</label>
              <p class="rm-hint">주제를 입력하면 8개 언어권에서 기관 리포트를 검색합니다.</p>
              <div class="rm-input-row">
                <input id="rm-topic" type="text" placeholder="예: eVTOL 규제, 드론 배송" />
                <button id="rm-topic-btn" class="crawl-btn" type="button">리포트</button>
                <button id="rm-stats-btn" class="crawl-btn rm-stats-btn" type="button">통계</button>
              </div>
              <p class="rm-hint rm-hint-sub">리포트: 보고서·논문 중심 | 통계: 수치·차트·데이터셋 중심</p>
            </div>

            <div class="rm-divider"></div>

            <div class="rm-section">
              <label for="rm-region">지역별 소스 발견</label>
              <p class="rm-hint">선택한 지역의 기관 웹사이트에서 RSS 피드를 자동 탐색합니다.</p>
              <select id="rm-region" multiple size="5">
                <option value="all" selected>전체 지역</option>
                <option value="north_america">북미</option>
                <option value="europe">유럽</option>
                <option value="china">중국</option>
                <option value="japan">일본</option>
                <option value="korea">한국</option>
                <option value="southeast_asia">동남아</option>
                <option value="middle_east">중동</option>
                <option value="russia">러시아</option>
                <option value="africa">아프리카</option>
                <option value="india">인도</option>
                <option value="oceania">오세아니아</option>
                <option value="latin_america">중남미</option>
              </select>
              <button id="rm-region-btn" class="crawl-btn" type="button">소스 발견</button>
            </div>
          </section>

          <section id="rm-job-panel" class="panel rm-job-panel hidden">
            <div class="panel-head">
              <h2>수집 진행</h2>
              <div class="panel-head-actions">
                <p id="rm-job-status-label">대기</p>
                <button id="rm-reset-btn" class="rm-reset-btn" type="button">초기화</button>
              </div>
            </div>
            <div id="rm-status" class="rm-status">대기 중</div>
            <div class="drawer-progress-row" style="margin-top:10px">
              <div class="crawl-progress"><span id="rm-progress-bar" style="width:0%"></span></div>
              <span id="rm-progress-text">0/0</span>
            </div>
            <div id="rm-log" class="rm-log"></div>
          </section>
        </aside>

        <!-- 우측: 리포트 피드 -->
        <section class="rm-feed-section">
          <div class="rm-feed-header">
            <div>
              <h2>수집된 리포트</h2>
              <p id="rm-count" class="rm-count-label">0건</p>
            </div>
            <div class="rm-filters">
              <input id="rm-search" type="search" placeholder="검색" />
              <select id="rm-region-filter">
                <option value="all">전체 지역</option>
              </select>
              <select id="rm-doc-type-filter">
                <option value="all">전체 유형</option>
                <option value="논문">논문</option>
                <option value="보고서">보고서</option>
                <option value="통계">통계</option>
                <option value="정부문서">정부문서</option>
                <option value="국제기구">국제기구</option>
                <option value="뉴스">뉴스</option>
              </select>
              <select id="rm-source-filter">
                <option value="all">전체 소스</option>
              </select>
              <button id="rm-clear-reports" class="rm-reset-btn" type="button">리포트 초기화</button>
            </div>
          </div>
          <div id="rm-feed" class="feed-list"></div>
        </section>
      </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="./utils.js"></script>
    <script src="./report_monitor.js"></script>
  </body>
</html>
